version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitora_app
    ports:
      - "31333:80"
    volumes:
      - .:/var/www/html
    networks:
      - monitora_network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:5.7.40
    container_name: monitora_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: monitora123
      MYSQL_DATABASE: monitora
      MYSQL_USER: monitora
      MYSQL_PASSWORD: monitora123
    ports:
      - "3033:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./bd_monitora.sql:/docker-entrypoint-initdb.d/bd_monitora.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - monitora_network

networks:
  monitora_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local