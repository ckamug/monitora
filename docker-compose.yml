version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitora_app
    ports:
      - "31333:80"
    volumes:
      - .:/var/www/html
    networks:
      - monitora_network
    depends_on:
      - db

  db:
    image: mysql:5.7.40
    container_name: monitora_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: monitora
      MYSQL_USER: monitora
      MYSQL_PASSWORD: monitora123
    ports:
      - "3033:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - monitora_network

networks:
  monitora_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local